apiVersion: v1
kind: ConfigMap
metadata:
  name: web-app-html
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>EKS Production ALB - Web App</title>
        <style>
            body {
                font-family: 'Outfit', 'Inter', sans-serif;
                background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
                color: #f8fafc;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
            }
            .card {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 16px;
                padding: 2.5rem;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
                text-align: center;
                max-width: 500px;
                animation: fadeIn 1s ease-out;
            }
            h1 {
                background: linear-gradient(to right, #38bdf8, #818cf8);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                margin-bottom: 0.5rem;
            }
            .badge {
                background: #10b981;
                color: #fff;
                padding: 0.3rem 0.8rem;
                border-radius: 9999px;
                font-size: 0.85rem;
                font-weight: 600;
                display: inline-block;
                margin-top: 1rem;
            }
            p {
                color: #94a3b8;
                line-height: 1.6;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Web Application</h1>
            <p>Successfully routed via AWS ALB Ingress Controller to Amazon EKS pods.</p>
            <p><strong>Deployment:</strong> web-app-deployment</p>
            <div class="badge">Target Type: IP</div>
        </div>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-deployment
  namespace: default
  labels:
    app: web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
        resources:
          limits:
            cpu: "250m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
      volumes:
      - name: html-volume
        configMap:
          name: web-app-html
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-app-json
  namespace: default
data:
  index.html: |
    {
      "status": "success",
      "service": "Mock API Gateway",
      "host": "api.company.com",
      "environment": "production",
      "provider": "Amazon EKS",
      "ingress": "AWS ALB Ingress Controller",
      "targetType": "ip",
      "health": "green"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-app-deployment
  namespace: default
  labels:
    app: api-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-app
  template:
    metadata:
      labels:
        app: api-app
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: json-volume
          mountPath: /usr/share/nginx/html
        resources:
          limits:
            cpu: "250m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
      volumes:
      - name: json-volume
        configMap:
          name: api-app-json
